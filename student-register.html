<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Student Registration</h2>

<input id="name" placeholder="Full Name">

<input id="roll" placeholder="Roll Number">

<select id="branch">
    <option>CSE</option>
    <option>ECE</option>
    <option>EEE</option>
    <option>MECH</option>
    <option>CIVIL</option>
</select>

<button onclick="register()">
    Submit
</button>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {

    apiKey: "AIzaSyBC5TDOKTU3Unr2ogMLmgWNuFMbsVJEa5Q",

    authDomain: "library-580fc.firebaseapp.com",

    projectId: "library-580fc",

    storageBucket: "library-580fc.firebasestorage.app",

    messagingSenderId: "789348069555",

    appId: "1:789348069555:web:092bc0e11d443028a3c0c6",

    measurementId: "G-EMYS59GZ3P"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.register = async function() {

    const name =
        document.getElementById("name").value.trim();

    const roll =
        document.getElementById("roll").value.trim();

    const branch =
        document.getElementById("branch").value;

    if (!name || !roll) {

        alert("Fill all fields");

        return;
    }

    try {

        await addDoc(
            collection(db, "students"),
            {
                name: name,
                roll: roll,
                branch: branch,
                createdAt: new Date()
            }
        );

        alert("Registered Successfully!");

        document.getElementById("name").value = "";

        document.getElementById("roll").value = "";

    }
    catch(error) {

        alert("Error: " + error.message);

    }

};

</script>

</body>
</html>
